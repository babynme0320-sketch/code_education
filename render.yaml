services:
  - type: web
    name: coding-edu-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: yes
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
